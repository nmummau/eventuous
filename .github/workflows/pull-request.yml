name: "PR Build and test"
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - docs/**

jobs:
  event_file:
    name: "Event File"
    runs-on: ubuntu-latest
    steps:
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Event File
          path: ${{ github.event_path }}

  build-and-test:
    name: "Build and test"
    runs-on: [ self-hosted, type-cx42, type-cpx41, image-x86-app-docker-ce, volume-cache-20GB ]
    strategy:
      matrix:
        dotnet-version: [ '8.0', '9.0' ]
    env:
      NUGET_PACKAGES: "/mnt/cache/.nuget/packages"
      DOTNET_INSTALL_DIR: "/mnt/cache/.dotnet"
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0
            9.0
      -
        name: Prepare Testcontainers Cloud agent
        if: env.TC_CLOUD_TOKEN != ''
        uses: atomicjar/testcontainers-cloud-setup-action@main
      -
        name: Run tests
        run: |
          dotnet test -c "Debug CI" -f net${{ matrix.dotnet-version }}
      -
        name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test Results ${{ matrix.dotnet-version }}
          path: |
            test-results/**/*.xml
            test-results/**/*.trx
            test-results/**/*.json